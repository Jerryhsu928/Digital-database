    <style>

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; background: radial-gradient(circle at 20% 30%, #1e2a4a, #0b1423); }
        .app-container { width: 100%; max-width: 1400px; height: 100vh; background: rgba(15, 25, 45, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid rgba(255,255,255,0.1); z-index: 2; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }
        /* 點擊動畫規則 (與前相同) */
        .auth-btn, .download-btn, .website-btn, .source-input-group button, .save-btn, .delete-btn, .logout-btn, .theme-option, .language-select, .project-card, .nav-item, .sidebar-toggle, .device-btn, .source-type-btn, .project-card .download-btn, .project-card .website-btn, .device-selector button { transition: transform 0.15s ease, background 0.2s, opacity 0.2s, box-shadow 0.2s; cursor: pointer; user-select: none; border: none; outline: none; }
        .auth-btn:active, .download-btn:active, .website-btn:active, .source-input-group button:active, .save-btn:active, .delete-btn:active, .logout-btn:active, .theme-option:active, .language-select:active, .project-card:active, .nav-item:active, .sidebar-toggle:active, .device-btn:active, .source-type-btn:active, .project-card .download-btn:active, .project-card .website-btn:active, .device-selector button:active { transform: scale(0.96); }
        .auth-btn.loading, .download-btn.loading, .website-btn.loading, .source-input-group button.loading, .save-btn.loading, .delete-btn.loading, .logout-btn.loading, .project-card .download-btn.loading, .project-card .website-btn.loading, .device-btn.loading { opacity: 0.7; pointer-events: none; }
        .auth-btn.loading i, .download-btn.loading i, .website-btn.loading i, .source-input-group button.loading i, .save-btn.loading i, .delete-btn.loading i, .logout-btn.loading i, .project-card .download-btn.loading i, .project-card .website-btn.loading i, .device-btn.loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 設備模式 */
        body.mobile .sidebar { width: 70px; }
        body.mobile .sidebar.collapsed { width: 50px; }
        body.mobile .sidebar .nav-item { width: 50px; height: 50px; font-size: 0.7rem; }
        body.mobile .sidebar.collapsed .nav-item { width: 40px; height: 40px; }

        body.mobile .auth-tab { font-size: 0.8rem; padding: 8px; }

        body.desktop .sidebar { width: 100px; }
        body.desktop .sidebar.collapsed { width: 70px; }
        body.desktop .sidebar .nav-item { width: 70px; height: 70px; font-size: 0.75rem; }

        body.light-mode .delete-btn { background: #ef4444 !important; }
        body.light-mode .logout-btn { background: rgba(239,68,68,0.8) !important; }
        body.light-mode .theme-option { background: #e2e8f0 !important; color: #334155 !important; }
        body.light-mode .theme-option.active { background: #2563eb !important; color: white !important; }

        body.dark-mode .app-container { background: rgba(15, 25, 45, 0.6); }
        body.dark-mode .auth-card { background: rgba(20, 30, 50, 0.9); }
        body.dark-mode .sidebar { background: rgba(20, 30, 50, 0.7); }

        body.dark-mode .toast { background: #1e293b; color: white; }
        body.dark-mode table td, body.dark-mode table th { color: #e2e8f0; }
        /* 登入卡片 */
        .auth-card { max-width: 500px; width: 100%; margin: auto; border-radius: 40px; padding: 30px 25px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 30px 50px -20px black; max-height: 90vh; overflow-y: auto; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 50px; flex-wrap: wrap; }
        .auth-tab { flex: 1 1 auto; text-align: center; padding: 12px; font-weight: 600; font-size: 1rem; color: #94a3b8; cursor: pointer; border-radius: 40px; transition: 0.3s; }
        .auth-tab.active { background: #2563eb; color: white; box-shadow: 0 5px 15px #2563eb; }

        .form-group label { font-weight: 500; font-size: 0.85rem; color: #a5b4cb; display: block; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 14px 18px; border-radius: 40px; font-size: 0.95rem; transition: 0.2s; -webkit-appearance: none; appearance: none; }
        .form-control:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
        .auth-btn { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; padding: 14px; border-radius: 50px; font-weight: 600; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .device-selector { display: flex; gap: 8px; margin-left: auto; }

        /* 主面板 */
        .main-panel { display: none; flex: 1; gap: 15px; height: 100%; overflow: hidden; }
        .sidebar { background: rgba(20, 30, 50, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 35px; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.15); height: 100%; overflow-y: auto; transition: width 0.3s; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); border-radius: 25px; color: white; border: 1px solid rgba(255,255,255,0.1); gap: 5px; font-size: 0.75rem; width: 70px; height: 70px; }
        .sidebar .nav-item i { font-size: 1.5rem; }
        .nav-item.active { background: #2563eb; border-color: white; box-shadow: 0 0 20px #2563eb; }
        .sidebar-toggle { width: 100%; display: flex; justify-content: center; margin-bottom: 10px; cursor: pointer; color: white; font-size: 1.2rem; }
        .content-area { flex: 1; min-width: 0; height: 100%; overflow-y: auto; padding-right: 5px; scrollbar-width: thin; }
        .page-card { background: rgba(25, 35, 55, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 40px; padding: 25px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.15); }
        .page-title { font-size: 2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .project-card { background: rgba(0,0,0,0.2); border-radius: 25px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .project-card.locked { opacity: 0.6; }
        .project-card.unlocked { border-color: #4ade80; }
        .project-card .letter { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .project-card .name { font-size: 0.9rem; color: #94a3b8; display: none; }
        .project-card.unlocked .name { display: block; }
        .project-card .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 0.8rem; }
        .project-detail { margin-top: 20px; }
        .project-detail img { max-width: 100%; border-radius: 20px; margin: 15px 0; }
        .download-btn, .website-btn { display: inline-block; background: #2563eb; color: white; padding: 12px 25px; border-radius: 40px; text-decoration: none; margin: 10px 5px; }
        .website-btn { background: #10b981; }
        .timer { font-size: 1.2rem; color: #fbbf24; margin: 10px 0; }
        /* 表格樣式 */
        .password-table, .user-table { width: 100%; border-collapse: collapse; }
        .password-table th, .password-table td, .user-table th, .user-table td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: middle; }
        .password-table input, .user-table input, .user-table select { padding: 5px; border-radius: 20px; background: #1e293b; color: white; border: 1px solid #3b82f6; width: 100%; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 20px; }
        /* 設定頁面 */
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 10px; }
        .settings-item .value { background: #1e293b; padding: 5px 15px; border-radius: 30px; color: white; }
        .settings-item .dots { letter-spacing: 3px; font-size: 1.2rem; }
        .theme-toggle { display: flex; gap: 10px; flex-wrap: wrap; }
        .theme-option { padding: 8px 20px; border-radius: 30px; background: #1e293b; color: #94a3b8; }
        .theme-option.active { background: #2563eb; color: white; }
        .language-select { background: #1e293b; color: white; padding: 8px 15px; border-radius: 30px; border: 1px solid #3b82f6; }
        .version-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .logout-btn { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid #ef4444; padding: 12px 30px; border-radius: 40px; display: inline-block; margin-top: 20px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; z-index: 9999; opacity: 0; transform: translateY(20px); border: 1px solid #3b82f6; pointer-events: none; transition: opacity 0.3s, transform 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
        /* 條款內容區塊 (用於浮層) */
        .terms-box { background: rgba(0,0,0,0.2); border-radius: 30px; padding: 20px; max-height: 300px; overflow-y: auto; }
        .terms-box p { white-space: pre-wrap; }
        /* 條款浮層 */
        .terms-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .terms-modal.show {
            visibility: visible;
            opacity: 1;
        }
        .terms-modal-content {
            background: #1e293b;
            border-radius: 40px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #3b82f6;
        }
        .terms-modal-content h2 {
            margin-bottom: 20px;
            color: white;
        }
        .terms-modal-content .terms-box {
            margin: 20px 0;
            background: #0f172a;
        }
        .terms-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .terms-modal-buttons button {
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
        }
        .btn-agree {
            background: #2563eb;
            color: white;
        }
        .btn-disagree {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body class="dark-mode desktop">
    <canvas id="particleCanvas"></canvas>

    <div class="app-container">
        <!-- 頂部設備選擇器 (登入後顯示) -->
        <div id="deviceSelector" style="display: none; justify-content: flex-end; margin-bottom: 10px;">
            <div class="device-selector">
                <button class="device-btn active" data-device="desktop"><i class="fas fa-desktop"></i> 桌面</button>
                <button class="device-btn" data-device="tablet"><i class="fas fa-tablet-alt"></i> 平板</button>
                <button class="device-btn" data-device="mobile"><i class="fas fa-mobile-alt"></i> 手機</button>
            </div>
        </div>

        <!-- 登入卡片 (三個頁籤) -->
        <div id="authCard" class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab">登入</div>
                <div class="auth-tab" id="permCodeTab">永久原始碼</div>
                <div class="auth-tab" id="onceCodeTab">一次性原始碼</div>
            </div>

            <!-- 登入表單 (帳號密碼) -->
            <div id="loginForm" class="auth-form">
                <h3>帳號密碼登入</h3>
                <div class="form-group">
                    <label>👤 帳號</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="請輸入帳號" value="">
                </div>
                <div class="form-group">
                    <label>🔑 密碼</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="請輸入密碼" value="">
                </div>
                <div id="loginError" class="error-message"><i class="fas fa-exclamation-triangle"></i> 帳號或密碼錯誤</div>
                <button class="auth-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> 登入</button>
            </div>

            <!-- 永久原始碼登入 -->
            <div id="permCodeForm" class="auth-form" style="display: none;">
                <h3>永久原始碼登入</h3>
                <div class="form-group">
                    <label>🔢 請輸入永久原始碼 (24位數字)</label>
                    <input type="text" class="form-control" id="permCode" placeholder="例如 102030405060708090102030" value="">
                    <small style="color:#94a3b8;">格式：前15碼用戶ID + 中間6碼檔案密碼 + 末3碼使用秒數</small>
                </div>
                <div id="permCodeError" class="error-message"><i class="fas fa-exclamation-triangle"></i> 原始碼無效</div>
                <button class="auth-btn" id="permCodeBtn"><i class="fas fa-key"></i> 登入</button>
            </div>

            <!-- 一次性原始碼登入 -->
            <div id="onceCodeForm" class="auth-form" style="display: none;">
                <h3>一次性原始碼登入</h3>
                <div class="form-group">
                    <label>🔢 請輸入一次性原始碼 (9位數字)</label>
                    <input type="text" class="form-control" id="onceCode" placeholder="例如 123456789" value="">
                    <small style="color:#94a3b8;">中間3碼為使用秒數，例如 123456789 時間 456 秒</small>
                </div>
                <div id="onceCodeError" class="error-message"><i class="fas fa-exclamation-triangle"></i> 原始碼無效或已使用</div>
                <button class="auth-btn" id="onceCodeBtn"><i class="fas fa-key"></i> 登入</button>
            </div>
        </div>

        <!-- 主面板 (登入後) -->
        <div id="mainPanel" class="main-panel">
            <!-- 左側導航 (可折疊) -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></div>
                <div class="nav-item active" data-page="files"><i class="fas fa-folder"></i><span>檔案</span></div>
                <!-- 超級用戶專屬導航 (創造者可見) -->
                <div class="nav-item" data-page="passwordVault" id="passwordVaultNav" style="display: none;"><i class="fas fa-lock"></i><span>密碼庫</span></div>
                <div class="nav-item" data-page="permCodeAdmin" id="permCodeAdminNav" style="display: none;"><i class="fas fa-key"></i><span>永久原始碼</span></div>
                <div class="nav-item" data-page="onceCodeAdmin" id="onceCodeAdminNav" style="display: none;"><i class="fas fa-code"></i><span>一次性原始碼</span></div>
                <div class="nav-item" data-page="fileAdmin" id="fileAdminNav" style="display: none;"><i class="fas fa-edit"></i><span>檔案管理</span></div>
                <div class="nav-item" data-page="userManagement" id="userManagementNav" style="display: none;"><i class="fas fa-users-cog"></i><span>用戶管理</span></div>
                <div class="nav-item" data-page="termsAdmin" id="termsAdminNav" style="display: none;"><i class="fas fa-file-contract"></i><span>條款管理</span></div>
                <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span>設定</span></div>
            </div>

            <!-- 右側內容區 (可滑動) -->
            <div class="content-area" id="contentArea"></div>
        </div>

        <!-- 條款同意浮層 -->
        <div class="terms-modal" id="termsModal">
            <div class="terms-modal-content">
                <h2>使用條款</h2>
                <div class="terms-box" id="termsModalContent">
                    <!-- 內容會由 JavaScript 動態填入 -->
                </div>
                <div class="terms-modal-buttons">
                    <button class="btn-disagree" id="termsDisagree">不同意</button>
                    <button class="btn-agree" id="termsAgree">同意</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

                pendingTargetLetter = targetLetter;

                // 顯示條款浮層
                showTermsModal();

                        termsContent = newContent;
                        saveTermsContent();
                        showToast('✅ 條款已更新');
                    });
                } else if (page === 'settings') {
                    let currentPassword = (users[currentUser.username] && users[currentUser.username].password) || '';
                    let dots = '●'.repeat(currentPassword.length) || '';
                    html = `<div class="page-card">
                        <div class="page-title"><i class="fas fa-cog"></i> ${t('settingsTitle')}</div>
                        <div class="settings-item">
                            <span>${t('accountName')}</span>
                            <span class="value">${currentUser.username}</span>
                        </div>
                        <div class="settings-item">
                            <span>${t('passwordLabel')}</span>
                            <span class="value dots">${dots}</span>
                        </div>
                        <div class="settings-item">
                            <span>${t('accountId')}</span>
                            <span class="value">${currentUser.accountId}</span>
                        </div>
                        <div class="settings-item">
                            <span>${t('language')}</span>
                            <select class="language-select" id="langSelect">
                                <option value="zh-TW" ${currentLang === 'zh-TW' ? 'selected' : ''}>繁體中文</option>
                                <option value="en" ${currentLang === 'en' ? 'selected' : ''}>English</option>
                            </select>
                        </div>
                        <div class="settings-item">
                            <span>${t('theme')}</span>
                            <div class="theme-toggle">
                                <div class="theme-option ${document.body.classList.contains('light-mode') ? 'active' : ''}" id="lightTheme">${t('light')}</div>
                                <div class="theme-option ${document.body.classList.contains('dark-mode') ? 'active' : ''}" id="darkTheme">${t('dark')}</div>
                            </div>
                        </div>
                        <div class="settings-item">
                            <span>${t('version')}</span>
                            <div class="version-info">
                                <span class="value">v${version}</span>
                                <button class="auth-btn" style="padding:5px 15px;" id="checkUpdate">${t('checkUpdate')}</button>
                            </div>
                        </div>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${t('logout')}</button>
                    </div>`;
                    contentArea.innerHTML = html;
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                    const checkUpdateBtn = document.getElementById('checkUpdate');
                    if (checkUpdateBtn) {
                        checkUpdateBtn.addEventListener('click', function() {
                            setButtonLoading(this, true);
                            setTimeout(() => {
                                setButtonLoading(this, false);
                                showToast(`✅ ${t('checkComplete')}`);
                            }, 1500);
                        });
                    }
                    document.getElementById('langSelect').addEventListener('change', (e) => {
                        setLanguage(e.target.value);
                    });
                    document.getElementById('lightTheme').addEventListener('click', () => {
                        document.body.classList.remove('dark-mode');
                        document.body.classList.add('light-mode');
                        document.getElementById('lightTheme').classList.add('active');
                        document.getElementById('darkTheme').classList.remove('active');
                        localStorage.setItem('theme', 'light');
                    });
                    document.getElementById('darkTheme').addEventListener('click', () => {
                        document.body.classList.remove('light-mode');
                        document.body.classList.add('dark-mode');
                        document.getElementById('darkTheme').classList.add('active');
                        document.getElementById('lightTheme').classList.remove('active');
                        localStorage.setItem('theme', 'dark');
                    });
                }
            }

            // 顯示檔案詳情
            function showFileDetail(letter) {
                let file = fileData[letter] || { name: letter+' 檔案', desc: '', downloadUrl: '#', imageUrl: '', websiteUrl: '#' };
                let unlocked = isUnlocked(letter);
                let expiryTime = currentUser.unlockedFiles?.[letter]?.expiry;
                let remaining = expiryTime ? Math.max(0, Math.floor((expiryTime - Date.now()) / 1000)) : 0;

                let html = `<div class="page-card">
                    <div class="page-title">檔案 ${letter} ${t('details')} <button class="auth-btn" style="padding:8px 15px; margin-left:auto;" onclick="renderPage('files')">${t('back')}</button></div>
                    <div class="project-detail">`;
                if (unlocked) {
                    html += `<h2>${file.name}</h2>
                        <p>${file.desc}</p>
                        <img src="${file.imageUrl}" alt="file image">
                        <div class="timer" id="timer-${letter}">${t('remaining')}：${remaining} ${t('seconds')}</div>
                        <a href="${file.downloadUrl}" class="download-btn" download><i class="fas fa-download"></i> ${t('download')}</a>
                        <a href="${file.websiteUrl}" class="website-btn" target="_blank"><i class="fas fa-external-link-alt"></i> ${t('website')}</a>`;
                } else {
                    html += `<p>此檔案尚未解鎖。</p>`;
                }
                html += `</div></div>`;
                contentArea.innerHTML = html;

                if (unlocked && currentUser.role !== 'creator') {
                    const timerEl = document.getElementById(`timer-${letter}`);
                    if (timerEl) {
                        const interval = setInterval(() => {
                            let expiry = currentUser.unlockedFiles?.[letter]?.expiry;
                            if (!expiry) {
                                clearInterval(interval);
                                timerEl.textContent = t('expired');
                                return;
                            }
                            let remaining = Math.max(0, Math.floor((expiry - Date.now()) / 1000));
                            timerEl.textContent = `${t('remaining')}：${remaining} ${t('seconds')}`;
                            if (remaining <= 0) {
                                clearInterval(interval);
                                delete currentUser.unlockedFiles[letter];
                                showToast(`⏰ 檔案 ${letter} 已過期`, 3000);
                                showFileDetail(letter);
                            }
                        }, 1000);
                    }
                }
            }

            // ========== 登入處理 ==========
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setButtonLoading(loginBtn, true);
                let username = document.getElementById('loginUsername').value.trim();
                let password = document.getElementById('loginPassword').value.trim();
                if (username === '0') {
                    if (!users['0']) {
                        users['0'] = { password: '', role: 'creator', accountId: 'CREATOR-0', name: '超級用戶', occupation: '管理員', class: '', number: '', email: 'creator@system.com' };
                        saveUsers();
                    }
                    let accountId = users['0'].accountId || generateAccountId('0', 'creator');
                    loginSuccess('0', 'creator', accountId);
                    setButtonLoading(loginBtn, false);
                    return;
                }
                if (!users[username] || users[username].password !== password) {
                    loginError.style.display = 'flex';
                    authCard.classList.add('shake');
                    setTimeout(() => authCard.classList.remove('shake'), 500);
                    setButtonLoading(loginBtn, false);
                    return;
                }
                let role = users[username].role || 'observer';
                let accountId = users[username].accountId || generateAccountId(username, role);
                loginSuccess(username, role, accountId);
                setButtonLoading(loginBtn, false);
            });

            permCodeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setButtonLoading(permCodeBtn, true);
                let code = document.getElementById('permCode').value.trim();
                if (!/^\d{24}$/.test(code)) {
                    permCodeError.style.display = 'flex';
                    setTimeout(() => permCodeError.style.display = 'none', 2000);
                    setButtonLoading(permCodeBtn, false);
                    return;
                }
                let userId = code.substring(0, 15);
                let filePwd = code.substring(15, 21);
                let expirySec = parseInt(code.substring(21, 24), 10);
                let fileLetter = null;
                for (let letter in filePasswords) {
                    if (filePasswords[letter] === filePwd) {
                        fileLetter = letter;
                        break;
                    }
                }
                if (!fileLetter) {
                    permCodeError.style.display = 'flex';
                    setTimeout(() => permCodeError.style.display = 'none', 2000);
                    setButtonLoading(permCodeBtn, false);
                    return;
                }
                let username = `MGR-${fileLetter}`;
                let role = 'manager';
                let accountId = generateAccountId(username, role);
                unlockFile(fileLetter, expirySec);
                loginSuccess(username, role, accountId, fileLetter);
                setButtonLoading(permCodeBtn, false);
            });

            onceCodeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                setButtonLoading(onceCodeBtn, true);
                let code = document.getElementById('onceCode').value.trim();
                let once = onceCodes[code];
                if (!once || once.used) {
                    onceCodeError.style.display = 'flex';
                    setTimeout(() => onceCodeError.style.display = 'none', 2000);
                    setButtonLoading(onceCodeBtn, false);
                    return;
                }
                once.used = true;
                saveOnceCodes();
                let fileLetter = once.fileLetter;
                let expirySec = once.expirySec;
                let username = `USR-${fileLetter}`;
                let role = 'user';
                let accountId = generateAccountId(username, role);
                unlockFile(fileLetter, expirySec);
                loginSuccess(username, role, accountId, fileLetter);
                setButtonLoading(onceCodeBtn, false);
            });

            function logout() {
                currentUser = { username: null, role: null, accountId: null, unlockedFiles: {} };
                mainPanel.style.display = 'none';
                authCard.style.display = 'block';
                deviceSelector.style.display = 'none';
                showToast('👋 ' + t('logout'));
            }

            // 頁籤切換
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active'); permCodeTab.classList.remove('active'); onceCodeTab.classList.remove('active');
                loginForm.style.display = 'flex'; permCodeForm.style.display = 'none'; onceCodeForm.style.display = 'none';
            });
            permCodeTab.addEventListener('click', () => {
                permCodeTab.classList.add('active'); loginTab.classList.remove('active'); onceCodeTab.classList.remove('active');
                permCodeForm.style.display = 'flex'; loginForm.style.display = 'none'; onceCodeForm.style.display = 'none';
            });
            onceCodeTab.addEventListener('click', () => {
                onceCodeTab.classList.add('active'); loginTab.classList.remove('active'); permCodeTab.classList.remove('active');
                onceCodeForm.style.display = 'flex'; loginForm.style.display = 'none'; permCodeForm.style.display = 'none';
            });

            // 初始化
            loginError.style.display = 'none';
            permCodeError.style.display = 'none';
            onceCodeError.style.display = 'none';
            authCard.style.display = 'block';
            mainPanel.style.display = 'none';
            deviceSelector.style.display = 'none';

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
            }

            applyLanguage();

            // 將 renderPage 和 showFileDetail 掛到 window 供 onclick 使用
            window.renderPage = renderPage;
            window.showFileDetail = showFileDetail;
        })();
    </script>

    <!-- ========================================================================= -->
    <!-- 🛠️ 完整修改教學 (給開發者看的) -->
    <!-- ========================================================================= -->
    <!--
        本系統所有可修改的資料皆儲存在 localStorage 中，並提供管理介面讓創造者直接修改。
        如果您想手動修改預設值，請在 JavaScript 中找到以下區塊：

        1. 語言文字：在 i18n 物件中，修改 'zh-TW' 或 'en' 下的對應鍵值。
           例如：將 termsContent 的值改為您想要的條款內容。

        2. 使用者帳號密碼：在 users 物件中，按照格式新增或修改。
           格式： "帳號": { password: "密碼", role: "角色", accountId: "ID", name: "姓名", occupation: "職業", class: "班級", number: "座號", email: "電子郵件" }
           角色可為：observer, user, manager, creator

        3. 檔案密碼：在 filePasswords 物件中，每個字母對應一個6碼密碼。
           例如：將 A 的密碼改為 "123456"。

        4. 永久原始碼記錄：在 permCodeRecords 陣列中，每個物件包含 userId(15碼), fileLetter(字母), expirySec(秒數)。
           例如：新增一筆記錄 { userId: "000000000000001", fileLetter: "A", expirySec: 600 }

        5. 一次性原始碼：在 onceCodes 物件中，鍵為9碼數字，值為 { fileLetter, used, expirySec }。
           例如：新增 "987654321": { fileLetter: "Z", used: false, expirySec: 500 }

        6. 檔案資訊：在 fileData 物件中，每個字母對應 { name, desc, downloadUrl, imageUrl, websiteUrl }。
           例如：將 A 的下載連結改為 "https://example.com/fileA.zip"

        7. 網站條款：在 termsContent 變數中，可直接修改預設文字。

        所有修改完成後，重新整理頁面即可生效。若想恢復預設值，請清除瀏覽器的 localStorage。
    -->
    <!-- ========================================================================= -->
</body>
</html>
